name: Weekly Mastodon Stats Post

on:
  schedule:
    # 10:00 and 11:00 UTC on Mondays; GitHub cron is UTC-only, and one of these corresponds to 12:00 Europe/Berlin
    # depending on daylight saving time. The script still guards actual posting to Berlin local 12:00.
    - cron: "0 10,11 * * 1"
  workflow_dispatch:
    inputs:
      force_post:
        description: "Post immediately (ignores time guard)"
        required: false
        default: "false"
      dry_run:
        description: "Build text only, do not post"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Post weekly status
        env:
          MASTODON_BASE_URL: https://norden.social
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          FORCE_POST: ${{ github.event.inputs.force_post || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/post_weekly_stats.py
